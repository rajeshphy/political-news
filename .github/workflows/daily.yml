name: Daily Political Brief

on:
  schedule:
    - cron: "45 20 * * *"  # 2:15 AM IST trigger, may publish around 6 AM if delayed
    - cron: "30 0 * * *"   # 06:00 IST
    - cron: "30 8 * * *"   # 14:00 IST
    - cron: "30 14 * * *"  # 20:00 IST
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate digest
        env:
          POLITICAL_API_KEY: ${{ secrets.POLITICAL_API_KEY }}
        run: python3 src/main.py

      - name: Commit generated post
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/_posts
          if ! git diff --cached --quiet; then
            git commit -m "Add political brief for $(date -u +%F)"
            git push
          fi

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: false

      - name: Install Jekyll dependencies
        run: |
          rm -f Gemfile.lock
          bundle install

      - name: Build Jekyll site
        run: bundle exec jekyll build --source docs --destination docs/_site

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
