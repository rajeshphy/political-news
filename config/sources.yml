settings:
  india_limit: 48
  world_limit: 24

  final_points_total: 5
  max_groups_per_section: 10
  min_group_score: 3

  require_ist_today: true
  max_age_hours: 30
  allow_unknown_dates: false

  india_keywords: >-
    india,indian,national,central government,union government,parliament,
