  low_value_keywords: >-
    opinion,editorial,podcast,quiz,photo gallery,web story,celebrity,
    birthday,wishes,speech only,reaction only,slogan,row over poster,
    viral video,social media post

  exclude_keywords: >-
    horoscope,astrology,photo gallery,photos,web story,viral video,recipe,
    entertainment,film,box office,cricket,football,celebrity,birthday wishes,
    opinion,editorial,live score,israeli parliament,knesset,hitchin,
    uk prime minister,sports ministry,taekwondo

